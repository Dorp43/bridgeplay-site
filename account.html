<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BridgePlay</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06060b;
            --bg-secondary: #0c0c14;
            --bg-card: #11111b;
            --border: #1e1e2e;
            --border-light: #2a2a3d;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a80;
            --accent: #4a9eff;
            --accent-glow: rgba(74, 158, 255, 0.15);
            --green: #6dd5a0;
            --orange: #f59e0b;
            --danger: #f87171;
            --purple: #a78bfa;
        }
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(6, 6, 11, 0.95);
            border-bottom: 1px solid rgba(30, 30, 46, 0.5);
        }
        .nav-logo {
            font-size: 1.3rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-back {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.9rem; font-weight: 500;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--text-primary); }

        /* Container */
        .page { max-width: 480px; margin: 0 auto; padding: 60px 24px; }

        /* Auth form */
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card h1 {
            font-size: 1.8rem; font-weight: 800;
            margin-bottom: 8px; letter-spacing: -0.5px;
        }
        .auth-card .subtitle {
            font-size: 0.9rem; color: var(--text-muted);
            margin-bottom: 32px;
        }
        .form-field {
            margin-bottom: 20px;
        }
        .form-field label {
            display: block; font-size: 0.85rem;
            font-weight: 600; color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-field input {
            width: 100%; padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-user-select: text; user-select: text;
        }
        .form-field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .auth-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: #fff; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.25);
            margin-top: 8px;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(74, 158, 255, 0.35);
        }
        .auth-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .auth-toggle {
            text-align: center; margin-top: 20px;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .auth-toggle a {
            color: var(--accent); text-decoration: none;
            font-weight: 600; cursor: pointer;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        .auth-error {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.2);
            color: var(--danger);
            padding: 12px 16px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }
        .auth-divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: var(--text-muted); font-size: 0.8rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .forgot-link {
            display: block; text-align: right;
            font-size: 0.8rem; color: var(--accent);
            text-decoration: none; margin-top: -12px; margin-bottom: 16px;
            cursor: pointer;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* Dashboard */
        .dashboard { display: none; animation: fadeIn 0.5s ease-out; }
        .profile-header {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 32px;
        }
        .profile-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--green));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 800; color: #fff;
            flex-shrink: 0;
        }
        .profile-info h2 {
            font-size: 1.1rem; font-weight: 700;
            word-break: break-all;
        }
        .profile-info .member-since {
            font-size: 0.8rem; color: var(--text-muted);
        }

        /* Status card */
        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .status-card h3 {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-muted); margin-bottom: 16px;
        }
        .status-row {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .status-row:last-child { border-bottom: none; }
        .status-label {
            font-size: 0.9rem; font-weight: 500;
            color: var(--text-secondary);
        }
        .status-value {
            font-size: 0.9rem; font-weight: 600;
        }
        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 100px;
            font-size: 0.8rem; font-weight: 700;
        }
        .pill-licensed {
            background: rgba(109,213,160,0.12);
            color: var(--green);
            border: 1px solid rgba(109,213,160,0.2);
        }
        .pill-trial {
            background: rgba(74,158,255,0.12);
            color: var(--accent);
            border: 1px solid rgba(74,158,255,0.2);
        }
        .pill-trial-warning {
            background: rgba(245,158,11,0.12);
            color: var(--orange);
            border: 1px solid rgba(245,158,11,0.2);
        }
        .pill-expired {
            background: rgba(248,113,113,0.12);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,0.2);
        }

        /* Action buttons */
        .action-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 12px;
            border-radius: 10px; font-size: 0.9rem;
            font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.2s;
            text-decoration: none; border: none;
        }
        .action-btn-outline {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }
        .action-btn-outline:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }
        .action-btn-danger {
            background: transparent; color: var(--danger);
            border: 1px solid rgba(248,113,113,0.2);
        }
        .action-btn-danger:hover {
            background: rgba(248,113,113,0.08);
        }
        .action-btn-primary {
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: #fff;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.2);
        }
        .action-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.3);
        }
        .actions-grid {
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Loading */
        .loading {
            display: flex; align-items: center; justify-content: center;
            padding: 80px 0; color: var(--text-muted);
            font-size: 0.9rem;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">BridgePlay</a>
        <a href="/" class="nav-back">&larr; Back to home</a>
    </nav>

    <div class="page">
        <!-- Loading state -->
        <div class="loading" id="loading-state">
            <div class="spinner"></div>
            Loading...
        </div>

        <!-- Auth form -->
        <div class="auth-card" id="auth-card" style="display:none;">
            <h1 id="auth-title">Sign In</h1>
            <p class="subtitle" id="auth-subtitle">Sign in to view your account details.</p>

            <div class="auth-error" id="auth-error"></div>

            <form id="auth-form">
                <div class="form-field">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" required>
                </div>
                <div class="form-field">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" placeholder="Your password" required>
                </div>
                <a class="forgot-link" id="forgot-link">Forgot password?</a>
                <button type="submit" class="auth-btn" id="auth-submit">Sign In</button>
            </form>

            <p class="auth-toggle">
                <span id="toggle-text">Don't have an account? </span>
                <a id="toggle-link">Sign Up</a>
            </p>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="profile-header">
                <div class="profile-avatar" id="user-avatar">?</div>
                <div class="profile-info">
                    <h2 id="user-email">Loading...</h2>
                    <div class="member-since" id="user-since"></div>
                </div>
            </div>

            <div class="status-card">
                <h3>License</h3>
                <div class="status-row">
                    <span class="status-label">Status</span>
                    <span id="license-status"></span>
                </div>
                <div class="status-row" id="trial-row" style="display:none;">
                    <span class="status-label">Trial</span>
                    <span class="status-value" id="trial-info"></span>
                </div>
                <div class="status-row">
                    <span class="status-label">Plan</span>
                    <span class="status-value" id="plan-info" style="color: var(--text-secondary);">—</span>
                </div>
            </div>

            <div class="status-card">
                <h3>Quick Actions</h3>
                <div class="actions-grid">
                    <a href="BridgePlay-latest.dmg" download class="action-btn action-btn-primary">Download BridgePlay</a>
                    <button class="action-btn action-btn-outline" id="btn-manage" style="display:none;">Manage Subscription</button>
                    <button class="action-btn action-btn-danger" id="btn-signout">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase config
        firebase.initializeApp({
            apiKey: "AIzaSyBTqWbkTUzQRG6xNDYAWgjzNDcaSNtvutU",
            authDomain: "bridgeplay-8f4f6.firebaseapp.com",
            projectId: "bridgeplay-8f4f6",
            storageBucket: "bridgeplay-8f4f6.firebasestorage.app",
            messagingSenderId: "438760266610",
            appId: "1:438760266610:ios:6c8c9319aefa219c4e5beb"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM refs
        const loadingEl = document.getElementById('loading-state');
        const authCard = document.getElementById('auth-card');
        const dashboard = document.getElementById('dashboard');
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSubmit = document.getElementById('auth-submit');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');
        const forgotLink = document.getElementById('forgot-link');

        let isSignUp = false;

        // Toggle sign in / sign up
        toggleLink.addEventListener('click', () => {
            isSignUp = !isSignUp;
            authError.style.display = 'none';
            if (isSignUp) {
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Sign up to start your 7-day free trial.';
                authSubmit.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account? ';
                toggleLink.textContent = 'Sign In';
                forgotLink.style.display = 'none';
            } else {
                authTitle.textContent = 'Sign In';
                authSubtitle.textContent = 'Sign in to view your account details.';
                authSubmit.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account? ";
                toggleLink.textContent = 'Sign Up';
                forgotLink.style.display = 'block';
            }
        });

        // Forgot password
        forgotLink.addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            if (!email) {
                showError('Enter your email address first, then click "Forgot password?"');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                authError.style.display = 'block';
                authError.style.background = 'rgba(109,213,160,0.1)';
                authError.style.borderColor = 'rgba(109,213,160,0.2)';
                authError.style.color = '#6dd5a0';
                authError.textContent = 'Password reset email sent! Check your inbox.';
            } catch (err) {
                showError(friendlyError(err.code));
            }
        });

        // Auth form submit
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            authError.style.display = 'none';
            authSubmit.disabled = true;
            authSubmit.textContent = isSignUp ? 'Creating account...' : 'Signing in...';

            try {
                if (isSignUp) {
                    await auth.createUserWithEmailAndPassword(email, password);
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (err) {
                showError(friendlyError(err.code));
                authSubmit.disabled = false;
                authSubmit.textContent = isSignUp ? 'Create Account' : 'Sign In';
            }
        });

        // Sign out
        document.getElementById('btn-signout').addEventListener('click', () => {
            auth.signOut();
        });

        // Auth state listener
        auth.onAuthStateChanged(async (user) => {
            loadingEl.style.display = 'none';
            if (user) {
                authCard.style.display = 'none';
                dashboard.style.display = 'block';
                await loadDashboard(user);
            } else {
                authCard.style.display = 'block';
                dashboard.style.display = 'none';
                authSubmit.disabled = false;
                authSubmit.textContent = isSignUp ? 'Create Account' : 'Sign In';
            }
        });

        async function loadDashboard(user) {
            // Set avatar and email
            document.getElementById('user-avatar').textContent = (user.email || '?')[0].toUpperCase();
            document.getElementById('user-email').textContent = user.email;

            // Fetch user doc from Firestore
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    const data = doc.data();

                    // Member since
                    if (data.createdAt) {
                        const date = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                        document.getElementById('user-since').textContent = 'Member since ' + date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    }

                    // License status
                    const statusEl = document.getElementById('license-status');
                    const trialRow = document.getElementById('trial-row');
                    const trialInfo = document.getElementById('trial-info');
                    const planInfo = document.getElementById('plan-info');

                    if (data.purchaseStatus === 'active') {
                        statusEl.innerHTML = '<span class="status-pill pill-licensed">Licensed</span>';
                        planInfo.textContent = 'Active subscription';
                        planInfo.style.color = 'var(--green)';
                        document.getElementById('btn-manage').style.display = 'flex';
                    } else if (data.trialStartDate) {
                        const trialStart = data.trialStartDate.toDate ? data.trialStartDate.toDate() : new Date(data.trialStartDate);
                        const now = new Date();
                        const daysPassed = Math.floor((now - trialStart) / (1000 * 60 * 60 * 24));
                        const daysLeft = Math.max(0, 7 - daysPassed);

                        trialRow.style.display = 'flex';

                        if (daysLeft > 0) {
                            if (daysLeft <= 2) {
                                statusEl.innerHTML = '<span class="status-pill pill-trial-warning">' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' left</span>';
                            } else {
                                statusEl.innerHTML = '<span class="status-pill pill-trial">' + daysLeft + ' days left</span>';
                            }
                            trialInfo.textContent = daysLeft + ' of 7 days remaining';
                            trialInfo.style.color = daysLeft <= 2 ? 'var(--orange)' : 'var(--accent)';
                            planInfo.textContent = 'Free trial';
                        } else {
                            statusEl.innerHTML = '<span class="status-pill pill-expired">Trial Expired</span>';
                            trialInfo.textContent = 'Expired';
                            trialInfo.style.color = 'var(--danger)';
                            planInfo.textContent = 'No active plan';
                        }
                    } else if (data.trialEligible === false) {
                        statusEl.innerHTML = '<span class="status-pill pill-expired">No Trial</span>';
                        planInfo.textContent = 'No active plan';
                    } else {
                        statusEl.innerHTML = '<span class="status-pill pill-trial">Pending</span>';
                        planInfo.textContent = 'Sign in from the app to activate';
                    }
                } else {
                    document.getElementById('license-status').innerHTML = '<span class="status-pill pill-trial">New Account</span>';
                    document.getElementById('plan-info').textContent = 'Open the app to activate your trial';
                }
            } catch (err) {
                console.error('Failed to load user data:', err);
                document.getElementById('license-status').innerHTML = '<span class="status-pill pill-expired">Error loading</span>';
            }
        }

        function showError(msg) {
            authError.style.display = 'block';
            authError.style.background = 'rgba(248,113,113,0.1)';
            authError.style.borderColor = 'rgba(248,113,113,0.2)';
            authError.style.color = '#f87171';
            authError.textContent = msg;
        }

        function friendlyError(code) {
            const map = {
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/user-disabled': 'This account has been disabled.',
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Try again.',
                'auth/invalid-credential': 'Invalid email or password.',
                'auth/email-already-in-use': 'An account with this email already exists.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/too-many-requests': 'Too many attempts. Please try again later.',
                'auth/network-request-failed': 'Network error. Check your connection.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }
    </script>
</body>
</html>
